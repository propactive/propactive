name: CI

# https://docs.github.com/en/actions/using-workflows/reusing-workflows
on: [workflow_call]

jobs:
  Test-Runner:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout to current branch'
        uses: actions/checkout@v3
      - name: 'Set up JDK 17'
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: liberica
          cache: gradle
      - name: 'Running propactive-jvm tests'
        run: ./gradlew propactive-jvm:test --info
      - name: 'Running propactive-plugin tests'
        run: ./gradlew propactive-plugin:test --info
      - name: 'Uploading test artifacts'
        if: success() || failure()
        uses: actions/upload-artifact@v3
        with:
          name: test-artifacts
          path: |
            ./*/build/test-results/test/*.xml
            ./*/build/reports

  Test-Reporter:
    needs: Test-Runner
    runs-on: ubuntu-latest
    environment: CICD
    steps:
      - name: 'Checkout to current branch'
        uses: actions/checkout@v3
      - name: 'Downloading all artifacts'
        uses: actions/download-artifact@v3
      - name: 'Generating test report for Github actions'
        uses: dorny/test-reporter@v1.5.0
        with:
          name: 'Test Report: JUnit'
          path: ./test-artifacts/*/build/test-results/test/*.xml
          reporter: java-junit
      - name: 'Generate test coverage badge'
        id: jacoco-coverage-reporter
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: | 
            ./test-artifacts/propactive-jvm/build/reports/jacoco/test/jacocoTestReport.csv
            ./test-artifacts/propactive-plugin/build/reports/jacoco/test/jacocoTestReport.csv
      - name: 'Commit test coverage badge'
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: 'Update test coverage badge'
          add: ./.github/badges/jacoco.svg
